name: Build LensDiff macOS

on:
  workflow_call:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    runs-on: macos-14

    defaults:
      run:
        shell: bash
        working-directory: source

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve package version
        id: version
        run: |
          version="$(grep -Eo 'set\(CUBE_DISPLAY_VERSION "[^"]+"\)' CMakeLists.txt | sed -E 's/.*"([^"]+)".*/\1/' | head -n1)"
          if [ -z "${version}" ]; then
            version="$(grep -Eo 'project\([^)]*VERSION [0-9A-Za-z.\-]+' CMakeLists.txt | sed -E 's/.*VERSION ([0-9A-Za-z.\-]+)/\1/' | head -n1)"
          fi
          if [ -z "${version}" ]; then
            echo "Could not determine LensDiff version from source/CMakeLists.txt"
            exit 1
          fi
          echo "package_version=${version}" >> "$GITHUB_OUTPUT"
          echo "zip_name=LensDiff_v${version}_macOS_universal_portable.zip" >> "$GITHUB_OUTPUT"
          echo "artifact_name=LensDiff-v${version}-macos-universal" >> "$GITHUB_OUTPUT"

      - name: Ensure local OFX SDK is available
        run: |
          if [ ! -f "ofx-sdk/include/ofxImageEffect.h" ]; then
            rm -rf ofx-sdk
            git clone --depth 1 https://github.com/AcademySoftwareFoundation/openfx.git ofx-sdk
          fi

      - name: Ensure build tools are available
        run: |
          if command -v ninja >/dev/null 2>&1; then
            ninja --version
          else
            brew install ninja
          fi

      - name: Configure
        run: |
          cmake -S . -B build-mac -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0

      - name: Build
        run: cmake --build build-mac --config Release

      - name: Verify bundle outputs
        run: |
          test -f bundle/LensDiff.ofx.bundle/Contents/MacOS/LensDiff.ofx
          test -f bundle/LensDiff.ofx.bundle/Contents/Resources/com.moazelgabry.lensdiff.png
          test -f bundle/LensDiff.ofx.bundle/Contents/Info.plist
          lipo -archs bundle/LensDiff.ofx.bundle/Contents/MacOS/LensDiff.ofx | grep -q "x86_64 arm64"
          otool -l bundle/LensDiff.ofx.bundle/Contents/MacOS/LensDiff.ofx | grep -A3 LC_BUILD_VERSION | grep -q "minos 13.0"

      - name: Package macOS portable bundle
        run: |
          zip_name="${{ steps.version.outputs.zip_name }}"
          package_path="${GITHUB_WORKSPACE}/${zip_name}"
          rm -f "${package_path}"
          ditto -c -k --sequesterRsrc --keepParent \
            bundle/LensDiff.ofx.bundle \
            "${package_path}"

      - name: Verify packaged macOS archive
        run: |
          package_path="${GITHUB_WORKSPACE}/${{ steps.version.outputs.zip_name }}"
          test -f "${package_path}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: ${{ github.workspace }}/${{ steps.version.outputs.zip_name }}
          if-no-files-found: error
