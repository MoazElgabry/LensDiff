name: Update Plugin Manager Manifest

on:
  workflow_dispatch:
  release:
    types:
      - published
      - edited

concurrency:
  group: update-plugin-manager-manifest-${{ github.event.release.id || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update-manager-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v5

      - name: Checkout manager repo
        uses: actions/checkout@v5
        with:
          repository: MoazElgabry/Moaz-Elgabry-plugins
          path: manager-repo
          token: ${{ secrets.MEPM_MANAGER_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Download published release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > plugin-releases.json

      - name: Regenerate manager manifests
        run: |
          node manager-repo/tools/generate-plugin-channel-manifests.mjs \
            --manager-root manager-repo \
            --config manager-release-config.json \
            --releases-json plugin-releases.json

      - name: Create manager manifest PR
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.MEPM_MANAGER_REPO_TOKEN }}
          path: manager-repo
          commit-message: "Update plugin manifests for LensDiff"
          branch: "automation/lensdiff-manifests"
          delete-branch: true
          title: "Update plugin manifests for LensDiff"
          body: |
            Regenerated manager manifests from published releases in
            `MoazElgabry/LensDiff`.

            Trigger: `${{ github.event_name }}`
            Release: `${{ github.event.release.tag_name || 'manual-run' }}`

      - name: Wait for and merge manager manifest PR
        if: ${{ steps.create_pr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.MEPM_MANAGER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.create_pr.outputs.pull-request-number }}"
          repo="MoazElgabry/Moaz-Elgabry-plugins"

          for attempt in {1..30}; do
            merge_state="$(gh pr view "${pr_number}" --repo "${repo}" --json mergeStateStatus --jq .mergeStateStatus)"
            echo "PR #${pr_number} merge state: ${merge_state} (attempt ${attempt}/30)"

            if [ "${merge_state}" = "CLEAN" ] || [ "${merge_state}" = "HAS_HOOKS" ]; then
              break
            fi

            if [ "${merge_state}" = "DIRTY" ] || [ "${merge_state}" = "BLOCKED" ]; then
              gh pr view "${pr_number}" \
                --repo "${repo}" \
                --json mergeStateStatus,reviewDecision,statusCheckRollup
              exit 1
            fi

            sleep 5
          done

          if [ "${merge_state}" != "CLEAN" ] && [ "${merge_state}" != "HAS_HOOKS" ]; then
            gh pr view "${pr_number}" \
              --repo "${repo}" \
              --json mergeStateStatus,reviewDecision,statusCheckRollup
            exit 1
          fi

          gh pr merge "${pr_number}" \
            --repo "${repo}" \
            --squash \
            --delete-branch
